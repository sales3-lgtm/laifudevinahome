<form id="quotation-form">

<div class="form-row">

<input type="text"
name="company_name"
placeholder="COMPANY NAME"
data-lang-placeholder="company_name"
required>

<input type="text"
name="contact_person"
placeholder="CONTACT PERSON"
data-lang-placeholder="email"
required>

</div>

<div class="form-row">

<input type="email"
name="user_email"
placeholder="EMAIL ADDRESS"
required>

<input type="text"
name="phone"
placeholder="PHONE NUMBER">

</div>
<!-- ... (상단 COMPANY NAME, EMAIL 등 입력란은 그대로 유지) ... -->

    <!-- 📌 변경: 타이틀과 그룹을 하나의 감싸는 부모 div 안에 넣어 정렬을 일치시킵니다. -->
    <div class="form-section-block">
<h3 data-lang="primary_collection">
PRIMARY COLLECTION
</h3>        <div class="collection-group">

<label>
<input type="checkbox"><span data-lang="corporate">CORPORATE</span></label>
<label>
<input type="checkbox"><span data-lang="industrial">INDUSTRIAL</span></label>
<label>
<input type="checkbox"><span data-lang="ir4">IR4+ESD</span></label>
<label>
<input type="checkbox"><span data-lang="medical">MEDICAL UNIFORM</span></label>
<label>
<input type="checkbox"><span data-lang="safety">SAFETY & PPE</span></label>
<label>
<input type="checkbox"><span data-lang="custom">CUSTOM</span></label>


        </div>
    </div>

    <input type="text" name="quantity" placeholder="ESTIMATED QUANTITY">

    <textarea name="customization" placeholder="CUSTOMIZATION NEEDS"></textarea>
    <textarea name="additional_notes" placeholder="ADDITIONAL NOTES"></textarea>

    <div class="contact-method">
        <label>
<span data-lang="email_contact">Email</span></label>
     
    </div>

    <!-- 📌 고유 클래스(privacy-agreement-row)를 부여하여 바깥의 유령 체크박스들과 완벽히 분리합니다 -->
    <label class="privacy-agreement-row">
        <input type="checkbox" required>
        <span>I AGREE TO PRIVACY POLICY</span>
    </label>

    <button
    id="submit-btn"
    data-lang="submit">
    SUBMIT REQUEST →
    </button>

</form>

<div id="success-message"></div>

<!-- 구글 번역 백그라운드 그릇 -->
<div id="google_translate_element" style="display:none;"></div>

<!-- 구글 공식 API 라이브러리 -->
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<!-- 📌 1. 내가 만든 이미지 번역 엔진을 가장 먼저 로드 -->
<script src="language.images.js"></script>

<!-- 📌 2. 구글 번역과 이미지 엔진을 함께 통제하는 컨트롤러 로드 -->
<script src="language.js"></script>


<!-- ⚠️ 중요: 만약 이 아래에 </form> 태그가 하나 더 중복되어 있거나, 
     과거에 쓰던 <label><input type="checkbox">...</label> 조각이 혼자 떨어져 있다면 꼭 찾아서 삭제해 주세요! -->
